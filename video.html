<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL ERROR</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Тег autoplay запускает видео, а loop зацикливает его -->
    <video autoplay loop id="scareVideo">
        <!-- Сюда вставьте прямую ссылку на ваше mp4 видео в интернете -->
        <source src="https://example.com" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        // Дополнительный скрипт принудительного старта для старых версий IE
        document.getElementById('scareVideo').play();
    </script>

</body>
</html>
